<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <button onclick="checkReturn()">Check Return Status</button>

    <p id="result"></p>

    <script>
        let order = {
            itemName: "Headphones",
            isDelivered: true,
            daysSinceDelivery: 5
        };

        function checkReturn() {
            document.getElementById("result").innerHTML =
                (order.isDelivered && order.daysSinceDelivery <= 7)
                    ? "Eligible for Return"
                    : "Return Period Expired";
            console.log("itemName exists:", "itemName" in order);
            delete order.daysSinceDelivery;

            console.log(order);
        }

    </script>

</body>

</html>
